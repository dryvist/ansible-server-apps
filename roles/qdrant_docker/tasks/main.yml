---
# Qdrant Docker Deployment Tasks
# Deploys Qdrant vector database as a Docker container

# =============================================================================
# Validation
# =============================================================================

- name: Validate Qdrant API key is set
  ansible.builtin.assert:
    that:
      - qdrant_docker_api_key | length > 0
    fail_msg: "QDRANT_API_KEY environment variable is not set. Add it to Doppler before deploying."
    quiet: true

# =============================================================================
# Docker Installation
# =============================================================================

- name: Gather OS facts
  ansible.builtin.setup:
    filter: ansible_distribution*

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository distribution
  ansible.builtin.set_fact:
    qdrant_docker_distro: "{{ ansible_distribution | lower }}"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ qdrant_docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ qdrant_docker_distro }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Install fuse-overlayfs for Docker on ZFS-backed LXC containers
  ansible.builtin.apt:
    name: fuse-overlayfs
    state: present

- name: Configure Docker to use fuse-overlayfs storage driver (required for ZFS-backed LXC)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "fuse-overlayfs"
      }
    owner: root
    group: root
    mode: "0644"
  register: qdrant_docker_daemon_config

- name: Restart Docker to apply fuse-overlayfs configuration
  ansible.builtin.systemd:  # noqa: no-handler
    name: docker
    state: restarted
  when: qdrant_docker_daemon_config.changed

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# =============================================================================
# Qdrant Data Directories
# =============================================================================

- name: Create qdrant storage directory
  ansible.builtin.file:
    path: "{{ qdrant_docker_data_dir }}/storage"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create qdrant snapshots directory
  ansible.builtin.file:
    path: "{{ qdrant_docker_data_dir }}/snapshots"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create qdrant config directory
  ansible.builtin.file:
    path: "{{ qdrant_docker_data_dir }}/config"
    state: directory
    owner: root
    group: root
    mode: "0750"

# =============================================================================
# Qdrant Configuration
# =============================================================================

- name: Deploy qdrant server configuration
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ qdrant_docker_data_dir }}/config/config.yaml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart qdrant

- name: Deploy qdrant docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ qdrant_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart qdrant

# =============================================================================
# Python venv for Ansible Docker modules
# =============================================================================

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

- name: Set Python interpreter to use venv for subsequent tasks
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Check if qdrant container is running
  ansible.builtin.command: docker ps -q --filter name={{ qdrant_docker_container_name }} --filter status=running
  register: qdrant_docker_running_check
  changed_when: false
  failed_when: false

- name: Clean stale qdrant Docker state before fresh deployment
  ansible.builtin.command:
    cmd: docker compose down --volumes --remove-orphans
    chdir: "{{ qdrant_docker_data_dir }}"
  when: qdrant_docker_running_check.stdout == ''
  changed_when: true
  failed_when: false

- name: Deploy qdrant via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ qdrant_docker_data_dir }}"
    state: present

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for qdrant HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ qdrant_docker_http_port }}"
    timeout: 60

- name: Verify qdrant health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ qdrant_docker_http_port }}/healthz"
    method: GET
    status_code: 200
  register: qdrant_docker_health
  retries: 10
  delay: 5
  until: qdrant_docker_health.status == 200
  changed_when: false
