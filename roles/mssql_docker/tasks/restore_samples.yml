---
- name: Check if sample databases already exist
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -C
      - -Q
      - "SELECT name FROM sys.databases WHERE name = '{{ item.name }}'"
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  loop: "{{ mssql_docker_sample_databases }}"
  loop_control:
    label: "{{ item.name }}"
  register: mssql_docker_db_exists
  changed_when: false
  no_log: true

- name: Download sample database files
  ansible.builtin.get_url:
    url: "{{ item.url }}"
    dest: "{{ mssql_docker_data_dir }}/backup/{{ item.name }}.{{ item.type | default('bak') }}"
    mode: "0644"
  loop: "{{ mssql_docker_sample_databases }}"
  loop_control:
    label: "{{ item.name }}"

- name: Restore .bak sample databases
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -C
      - -l
      - "60"
      - -Q
      - >-
        RESTORE DATABASE [{{ item.name }}]
        FROM DISK = '/var/opt/mssql/backup/{{ item.name }}.bak'
        WITH MOVE '{{ item.name }}' TO '/var/opt/mssql/data/{{ item.name }}.mdf',
             MOVE '{{ item.name }}_log' TO '/var/opt/mssql/data/{{ item.name }}_log.ldf',
             REPLACE, STATS = 10
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  loop: "{{ mssql_docker_sample_databases }}"
  when:
    - item.type | default('bak') == 'bak'
    - item.name not in mssql_docker_db_exists.results[ansible_loop.index0].stdout | default('')
  loop_control:
    label: "{{ item.name }}"
    index_var: ansible_loop
  register: mssql_docker_restore_bak
  changed_when: "'RESTORE DATABASE successfully processed' in mssql_docker_restore_bak.stdout"
  no_log: true

- name: Run SQL script databases
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -C
      - -l
      - "60"
      - -i
      - "/var/opt/mssql/backup/{{ item.name }}.sql"
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  loop: >-
    {{ mssql_docker_sample_databases
       | selectattr('type', 'defined')
       | selectattr('type', 'eq', 'sql') | list }}
  when: item.name not in mssql_docker_db_exists.results |
        selectattr('item.name', 'defined') |
        map(attribute='stdout') |
        join('')
  loop_control:
    label: "{{ item.name }}"
  changed_when: false
  no_log: true

- name: Verify sample databases were restored
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -C
      - -Q
      - >-
        SELECT name FROM sys.databases
        WHERE name NOT IN ('master','tempdb','model','msdb')
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  register: mssql_docker_db_list
  changed_when: false
  no_log: true

- name: Show restored databases
  ansible.builtin.debug:
    msg: "{{ mssql_docker_db_list.stdout_lines }}"
