---
# =============================================================================
# Docker Installation
# =============================================================================

- name: Gather OS facts
  ansible.builtin.setup:
    filter: ansible_distribution*

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository distribution
  ansible.builtin.set_fact:
    mssql_docker_docker_distro: "{{ ansible_distribution | lower }}"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ mssql_docker_docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ mssql_docker_docker_distro }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# =============================================================================
# Data Directory Setup
# =============================================================================

- name: Create MSSQL data directories
  ansible.builtin.file:
    path: "{{ mssql_docker_data_dir }}/{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - data
    - log
    - backup

# =============================================================================
# Docker Compose Deployment
# =============================================================================

- name: Deploy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ mssql_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: restart mssql

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

- name: Set Python interpreter to use venv for subsequent tasks
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

- name: Deploy SQL Server via docker-compose
  community.docker.docker_compose_v2:
    project_src: "{{ mssql_docker_data_dir }}"
    state: present
  no_log: true
  changed_when: false

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for SQL Server port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ mssql_docker_port }}"
    timeout: 120
    delay: 10

- name: Verify SQL Server is accepting connections
  community.docker.docker_container_exec:
    container: "{{ mssql_docker_container_name }}"
    argv:
      - /opt/mssql-tools18/bin/sqlcmd
      - -S
      - localhost
      - -U
      - sa
      - -Q
      - SELECT @@VERSION
      - -C
      - -l
      - "30"
    env:
      SQLCMDPASSWORD: "{{ mssql_docker_sa_password }}"
  register: mssql_docker_version_check
  retries: 6
  delay: 10
  until: (mssql_docker_version_check.rc | default(-1)) == 0
  changed_when: false
  no_log: true
  tags: [molecule-notest]

- name: Show SQL Server version
  ansible.builtin.debug:
    msg: "{{ mssql_docker_version_check.stdout_lines[0] }}"
  tags: [molecule-notest]

# =============================================================================
# Sample Database Restoration
# =============================================================================

- name: Restore sample databases
  ansible.builtin.include_tasks: restore_samples.yml
  when: mssql_docker_restore_samples | bool
