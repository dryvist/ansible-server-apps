---
# =============================================================================
# Work Directory Setup
# =============================================================================

- name: Create GitHub runner work directory
  ansible.builtin.file:
    path: "{{ github_runner_work_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

# =============================================================================
# Build Files
# =============================================================================

- name: Copy build files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ github_runner_work_dir }}/{{ item.src }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: Dockerfile, mode: "0644" }
    - { src: entrypoint.sh, mode: "0755" }
  register: github_runner_build_files

# =============================================================================
# Docker Compose Deployment
# =============================================================================

- name: Deploy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ github_runner_work_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  register: github_runner_compose

# =============================================================================
# Python venv for Ansible Docker modules
# =============================================================================

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

- name: Set Python interpreter to use venv for subsequent tasks
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

- name: Build runner image
  community.docker.docker_image:
    name: "{{ github_runner_image_name }}"
    tag: "{{ github_runner_image_tag }}"
    source: build
    build:
      path: "{{ github_runner_work_dir }}"
      pull: true
    force_source: "{{ github_runner_build_files.changed }}"

- name: Deploy GitHub Actions runners via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ github_runner_work_dir }}"
    project_name: github-runner
    state: present
    scale:
      runner: "{{ github_runner_replicas }}"

# =============================================================================
# Health Check
# =============================================================================

- name: Verify runner containers are running
  ansible.builtin.command:
    cmd: docker compose -p github-runner ps --format json
    chdir: "{{ github_runner_work_dir }}"
  register: github_runner_ps
  changed_when: false

- name: Assert all runner replicas are running
  vars:
    _runner_count: "{{ github_runner_ps.stdout_lines | map('from_json') | list | length }}"
  ansible.builtin.assert:
    that:
      - _runner_count | int >= github_runner_replicas | int
    fail_msg: >-
      Expected {{ github_runner_replicas }} runner containers but found
      {{ _runner_count }}
