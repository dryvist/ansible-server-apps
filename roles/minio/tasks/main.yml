---
# MinIO object storage installation and configuration

# Phase 1: Install prerequisites
- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

# Phase 2: Create system user
- name: Create minio system group
  ansible.builtin.group:
    name: "{{ minio_group }}"
    system: true
    state: present

- name: Create minio system user
  ansible.builtin.user:
    name: "{{ minio_user }}"
    group: "{{ minio_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/minio
    create_home: true
    state: present

# Phase 3: Create directories
- name: Create MinIO data directory
  ansible.builtin.file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"

- name: Create MinIO config directory
  ansible.builtin.file:
    path: "{{ minio_config_dir }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"

# Phase 4: Download binaries
# Downloads are staged on the Ansible controller then copied to the target.
# This supports containers with restricted outbound (e.g., outbound-internal
# firewall group) that cannot reach dl.min.io directly.
#
# force: true ensures fresh binaries every run — the dl.min.io URLs point
# to the rolling "latest" release, so any cached copy in /tmp may be stale.
#
# delegate_to + connection: local runs the task directly on the controller
# via the local connection plugin (no SSH loopback).
#
# ansible_become: false (via vars:) is REQUIRED. Task-level `become: false`
# alone is insufficient: Ansible 2.19 inherits the play's `become: true` on
# delegated tasks regardless of task-level become, causing `sudo: a password
# is required` on the controller. Setting `ansible_become` via task vars
# explicitly overrides the inherited value.
- name: Download minio server binary to controller
  ansible.builtin.get_url:
    url: "{{ minio_binary_url }}"
    dest: "/tmp/minio-server"
    mode: "0755"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Download minio client binary to controller
  ansible.builtin.get_url:
    url: "{{ minio_mc_binary_url }}"
    dest: "/tmp/minio-mc"
    mode: "0755"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  run_once: true

- name: Copy minio server binary to target
  ansible.builtin.copy:
    src: "/tmp/minio-server"
    dest: "{{ minio_install_dir }}/minio"
    owner: root
    group: root
    mode: "0755"

- name: Copy minio client binary to target
  ansible.builtin.copy:
    src: "/tmp/minio-mc"
    dest: "{{ minio_install_dir }}/mc"
    owner: root
    group: root
    mode: "0755"

# Phase 5: Deploy configuration
- name: Deploy MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    group: "{{ minio_group }}"
    mode: "0640"
  no_log: true
  notify: Restart minio

- name: Deploy MinIO systemd unit file
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart minio

# Phase 6: Enable and start service
- name: Enable and start MinIO service
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: true
    daemon_reload: true

# Phase 7: Health check
- name: Wait for MinIO to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ minio_api_port }}/minio/health/live"
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 10
  delay: 3
  changed_when: false

# Phase 8: Create buckets
- name: Configure mc alias for local MinIO
  ansible.builtin.command:
    cmd: >-
      {{ minio_install_dir }}/mc alias set local
      "http://127.0.0.1:{{ minio_api_port }}"
      "{{ minio_root_user }}" "{{ minio_root_password }}"
  no_log: true
  changed_when: false

- name: Create default buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc mb --ignore-existing local/{{ item.name }}"
  loop: "{{ minio_default_buckets }}"
  register: minio_bucket_result
  changed_when: "'Bucket created' in minio_bucket_result.stdout"

- name: Enable versioning on buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc version enable local/{{ item.name }}"
  loop: "{{ minio_default_buckets | selectattr('versioning', 'defined') | selectattr('versioning') | list }}"
  register: minio_versioning_result
  changed_when: "'is already enabled' not in minio_versioning_result.stdout"

- name: Set anonymous download policy on buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc anonymous set download local/{{ item.name }}"
  loop: >-
    {{ minio_default_buckets
       | selectattr('policy', 'defined')
       | selectattr('policy', 'equalto', 'download')
       | list }}
  register: minio_policy_result
  changed_when: "'is already set' not in minio_policy_result.stdout"

# Phase 9: Lifecycle policy — expire noncurrent versions to bound data volume.
# Without this, every re-upload retains prior versions forever (versioning is
# on), which will eventually fill the data volume.
#
# Add-if-missing only. If a noncurrent-expiration rule already exists the
# role leaves it alone, so operators can tighten the retention by hand
# without Ansible reverting the change on the next run.
- name: Query existing lifecycle rules on versioned buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc ilm rule ls --json local/{{ item.name }}"
  loop: >-
    {{ minio_default_buckets
       | selectattr('versioning', 'defined')
       | selectattr('versioning')
       | list }}
  loop_control:
    label: "{{ item.name }}"
  register: minio_ilm_query
  changed_when: false

- name: Add noncurrent-expiration rule when none exists
  ansible.builtin.command:
    cmd: >-
      {{ minio_install_dir }}/mc ilm rule add local/{{ item.item.name }}
      --noncurrent-expire-days {{ minio_noncurrent_expiration_days }}
  loop: "{{ minio_ilm_query.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  register: minio_ilm_add
  changed_when: "'Lifecycle configuration rule added' in minio_ilm_add.stdout"
  when: >-
    ((item.stdout | from_json).config.Rules | default([])
     | selectattr('NoncurrentVersionExpiration', 'defined')
     | list | length) == 0

# Phase 10: Mirror external infrastructure artifacts into the local bucket.
#
# Containers in the `outbound-internal` firewall group cannot reach public
# CDNs, so each role that needs an upstream tarball (Cribl, Ollama, etc.)
# pulls from MinIO instead. The controller — which has unrestricted egress —
# stages the download, then `mc cp` uploads it to the bucket.
#
# Idempotency: `mc stat` per-host decides whether the object already exists,
# and subsequent tasks short-circuit on the same host when it does. Existing
# objects are left alone so manual retention decisions are not clobbered on
# re-runs. Delete the bucket object manually (or wait for the lifecycle rule)
# to force a refresh.
#
# Per-host (no run_once): when minio_group grows beyond one host, each host
# re-checks `mc stat` against its own MinIO instance and independently
# triggers the controller download it needs. `get_url force: true` is safe
# under concurrent delegated invocations because the file is rewritten
# atomically and each host names its own staging path.
- name: Check which infra artifacts are already mirrored
  # Non-zero exit from `mc stat` is expected when the object is missing
  # (that is the signal that drives the downstream "if item.rc != 0" guard).
  # However, we want the task to fail loudly on any OTHER mc error —
  # alias misconfigured, MinIO unreachable, auth failure, etc. — rather
  # than silently treating "mc is broken" as "object missing" and
  # triggering a pointless download/upload pass. Accept only the two
  # known "missing object" signals: the message string mc emits and the
  # S3 error code in --json output.
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc stat --json local/{{ item.bucket }}/{{ item.key }}"
  loop: "{{ minio_infra_mirrors }}"
  loop_control:
    label: "{{ item.name }}"
  register: minio_infra_stat
  changed_when: false
  failed_when: >-
    minio_infra_stat.rc is defined and
    minio_infra_stat.rc != 0 and
    'Object does not exist' not in (minio_infra_stat.stderr | default('')) and
    'NoSuchKey' not in (minio_infra_stat.stdout | default(''))

- name: Stage missing infra artifacts on controller
  # force: true — these point at rolling "latest" upstream URLs, so
  # anything cached in /tmp from a prior run is assumed stale. The
  # controller always re-fetches to guarantee freshness.
  ansible.builtin.get_url:
    url: "{{ item.item.url }}"
    dest: "/tmp/minio-mirror-{{ inventory_hostname }}-{{ item.item.name }}"
    mode: "0644"
    force: true
  loop: "{{ minio_infra_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  when: item.rc != 0

- name: Push missing infra artifacts to target
  ansible.builtin.copy:
    src: "/tmp/minio-mirror-{{ inventory_hostname }}-{{ item.item.name }}"
    dest: "/tmp/minio-mirror-{{ item.item.name }}"
    mode: "0644"
  loop: "{{ minio_infra_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0

- name: Upload missing infra artifacts to MinIO
  ansible.builtin.command:
    cmd: >-
      {{ minio_install_dir }}/mc cp /tmp/minio-mirror-{{ item.item.name }}
      local/{{ item.item.bucket }}/{{ item.item.key }}
  loop: "{{ minio_infra_stat.results }}"
  loop_control:
    label: "{{ item.item.name }} -> {{ item.item.bucket }}/{{ item.item.key }}"
  register: minio_infra_upload
  changed_when: "'Total:' in minio_infra_upload.stdout"
  when: item.rc != 0

- name: Remove staging files from target
  ansible.builtin.file:
    path: "/tmp/minio-mirror-{{ item.item.name }}"
    state: absent
  loop: "{{ minio_infra_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.rc != 0

- name: Remove staging files from controller
  # Tarballs can be hundreds of MB (Cribl is ~76 MB). Leaving them in /tmp
  # on the workstation after upload accumulates disk usage over many runs.
  ansible.builtin.file:
    path: "/tmp/minio-mirror-{{ inventory_hostname }}-{{ item.item.name }}"
    state: absent
  loop: "{{ minio_infra_stat.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  delegate_to: localhost
  connection: local
  become: false
  vars:
    ansible_become: false
  when: item.rc != 0
