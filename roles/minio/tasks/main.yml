---
# MinIO object storage installation and configuration

# Phase 1: Install prerequisites
- name: Install required packages
  ansible.builtin.apt:
    name:
      - curl
      - ca-certificates
    state: present
    update_cache: true

# Phase 2: Create system user
- name: Create minio system group
  ansible.builtin.group:
    name: "{{ minio_group }}"
    system: true
    state: present

- name: Create minio system user
  ansible.builtin.user:
    name: "{{ minio_user }}"
    group: "{{ minio_group }}"
    system: true
    shell: /usr/sbin/nologin
    home: /opt/minio
    create_home: true
    state: present

# Phase 3: Create directories
- name: Create MinIO data directory
  ansible.builtin.file:
    path: "{{ minio_data_dir }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"

- name: Create MinIO config directory
  ansible.builtin.file:
    path: "{{ minio_config_dir }}"
    state: directory
    owner: "{{ minio_user }}"
    group: "{{ minio_group }}"
    mode: "0750"

# Phase 4: Download binaries
# Downloads are staged on the Ansible controller then copied to the target.
# This supports containers with restricted outbound (e.g., outbound-internal
# firewall group) that cannot reach dl.min.io directly.
#
# force: true ensures fresh binaries every run — the dl.min.io URLs point
# to the rolling "latest" release, so any cached copy in /tmp may be stale.
#
# delegate_to + connection: local runs the task directly on the controller
# via the local connection plugin (no SSH loopback). become: false is
# required because we don't (and shouldn't) have sudo on the controller.
- name: Download minio server binary to controller
  ansible.builtin.get_url:
    url: "{{ minio_binary_url }}"
    dest: "/tmp/minio-server"
    mode: "0755"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  run_once: true

- name: Download minio client binary to controller
  ansible.builtin.get_url:
    url: "{{ minio_mc_binary_url }}"
    dest: "/tmp/minio-mc"
    mode: "0755"
    force: true
  delegate_to: localhost
  connection: local
  become: false
  run_once: true

- name: Copy minio server binary to target
  ansible.builtin.copy:
    src: "/tmp/minio-server"
    dest: "{{ minio_install_dir }}/minio"
    owner: root
    group: root
    mode: "0755"

- name: Copy minio client binary to target
  ansible.builtin.copy:
    src: "/tmp/minio-mc"
    dest: "{{ minio_install_dir }}/mc"
    owner: root
    group: root
    mode: "0755"

# Phase 5: Deploy configuration
- name: Deploy MinIO environment file
  ansible.builtin.template:
    src: minio.env.j2
    dest: /etc/default/minio
    owner: root
    group: "{{ minio_group }}"
    mode: "0640"
  no_log: true
  notify: Restart minio

- name: Deploy MinIO systemd unit file
  ansible.builtin.template:
    src: minio.service.j2
    dest: /etc/systemd/system/minio.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart minio

# Phase 6: Enable and start service
- name: Enable and start MinIO service
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: true
    daemon_reload: true

# Phase 7: Health check
- name: Wait for MinIO to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ minio_api_port }}/minio/health/live"
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 10
  delay: 3
  changed_when: false

# Phase 8: Create buckets
- name: Configure mc alias for local MinIO
  ansible.builtin.command:
    cmd: >-
      {{ minio_install_dir }}/mc alias set local
      "http://127.0.0.1:{{ minio_api_port }}"
      "{{ minio_root_user }}" "{{ minio_root_password }}"
  no_log: true
  changed_when: false

- name: Create default buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc mb --ignore-existing local/{{ item.name }}"
  loop: "{{ minio_default_buckets }}"
  register: minio_bucket_result
  changed_when: "'Bucket created' in minio_bucket_result.stdout"

- name: Enable versioning on buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc version enable local/{{ item.name }}"
  loop: "{{ minio_default_buckets | selectattr('versioning', 'defined') | selectattr('versioning') | list }}"
  register: minio_versioning_result
  changed_when: "'is already enabled' not in minio_versioning_result.stdout"

- name: Set anonymous download policy on buckets
  ansible.builtin.command:
    cmd: "{{ minio_install_dir }}/mc anonymous set download local/{{ item.name }}"
  loop: >-
    {{ minio_default_buckets
       | selectattr('policy', 'defined')
       | selectattr('policy', 'equalto', 'download')
       | list }}
  register: minio_policy_result
  changed_when: "'is already set' not in minio_policy_result.stdout"
