---
# ntfy Docker Deployment Tasks
# Deploys ntfy push notification server as a Docker container

# =============================================================================
# Docker Installation
# =============================================================================

- name: Gather OS facts
  ansible.builtin.setup:
    filter: ansible_distribution*

- name: Install Docker prerequisites
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true

- name: Create keyrings directory
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

- name: Set Docker repository distribution
  ansible.builtin.set_fact:
    ntfy_docker_distro: "{{ ansible_distribution | lower }}"

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ntfy_docker_distro }}/gpg"
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"
    force: false

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc]
      https://download.docker.com/linux/{{ ntfy_docker_distro }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker

- name: Install Docker packages
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Install fuse-overlayfs for Docker on ZFS-backed LXC containers
  ansible.builtin.apt:
    name: fuse-overlayfs
    state: present

- name: Configure Docker to use fuse-overlayfs storage driver (required for ZFS-backed LXC)
  ansible.builtin.copy:
    dest: /etc/docker/daemon.json
    content: |
      {
        "storage-driver": "fuse-overlayfs"
      }
    owner: root
    group: root
    mode: "0644"
  register: ntfy_docker_daemon_config

- name: Restart Docker to apply fuse-overlayfs configuration
  ansible.builtin.systemd:  # noqa: no-handler
    name: docker
    state: restarted
  when: ntfy_docker_daemon_config.changed

- name: Ensure Docker service is running
  ansible.builtin.systemd:
    name: docker
    state: started
    enabled: true

# =============================================================================
# ntfy Data Directories
# =============================================================================

- name: Create ntfy cache directory
  ansible.builtin.file:
    path: "{{ ntfy_docker_data_dir }}/cache"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create ntfy config directory
  ansible.builtin.file:
    path: "{{ ntfy_docker_data_dir }}/config"
    state: directory
    owner: root
    group: root
    mode: "0755"

# =============================================================================
# ntfy Configuration
# =============================================================================

- name: Deploy ntfy server configuration
  ansible.builtin.template:
    src: server.yml.j2
    dest: "{{ ntfy_docker_data_dir }}/config/server.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ntfy

- name: Deploy ntfy docker-compose template
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: "{{ ntfy_docker_data_dir }}/docker-compose.yml"
    owner: root
    group: root
    mode: "0644"
  notify: Restart ntfy

# =============================================================================
# Python venv for Ansible Docker modules
# =============================================================================

- name: Install Python venv and pip for dependencies
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-venv
      - python3-full
    state: present
    update_cache: true

- name: Create virtualenv for Ansible Python dependencies
  ansible.builtin.pip:
    name:
      - docker
    state: present
    virtualenv: /opt/ansible-venv
    virtualenv_command: python3 -m venv

- name: Set Python interpreter to use venv for subsequent tasks
  ansible.builtin.set_fact:
    ansible_python_interpreter: /opt/ansible-venv/bin/python

# =============================================================================
# Deploy via Docker Compose
# =============================================================================

- name: Check if ntfy container is running
  ansible.builtin.command: docker ps -q --filter name=ntfy --filter status=running
  register: ntfy_docker_running_check
  changed_when: false
  failed_when: false

- name: Clean stale Docker state before fresh deployment
  ansible.builtin.command: docker system prune -af --volumes
  when: ntfy_docker_running_check.stdout == ''
  changed_when: true

- name: Deploy ntfy via docker compose
  community.docker.docker_compose_v2:
    project_src: "{{ ntfy_docker_data_dir }}"
    state: present

# =============================================================================
# Health Check
# =============================================================================

- name: Wait for ntfy HTTP port to be ready
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ ntfy_docker_http_port }}"
    timeout: 60

- name: Verify ntfy health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ ntfy_docker_http_port }}/v1/health"
    method: GET
    status_code: 200
  register: ntfy_docker_health
  retries: 10
  delay: 5
  until: ntfy_docker_health.status == 200
  changed_when: false
