---
# Static inventory - shared variables only
# All hosts are dynamically added by load_terraform.yml from ansible_inventory.json
# DO NOT add static host definitions here — they duplicate the dynamic inventory
# and cause conflicts (underscore vs hyphen naming, duplicate group membership)

all:
  vars:
    ansible_python_interpreter: /usr/bin/python3
    proxmox_domain: "{{ lookup('env', 'PROXMOX_DOMAIN') }}"
