---
# Pre-playbook that loads infrastructure inventory dynamically.
#
# Populates the Ansible inventory from the OpenTofu output emitted by
# `dryvist/tofu-proxmox-cluster`. The in-memory variable name
# `terraform_data` is preserved for backwards-compat with the 17
# inherited roles; the on-disk filename is `ansible_inventory.json`
# per the dryvist/homelab-schemas contract.
#
# Generate via (from dryvist/tofu-proxmox-cluster/environments/homelab):
#   terragrunt output -json ansible_inventory > \
#     ~/git/dryvist/ansible-server-apps/main/inventory/ansible_inventory.json

- name: Load Infrastructure Inventory
  hosts: localhost
  become: false
  gather_facts: false
  tags: always

  vars:
    # Override global ansible_become for localhost tasks
    ansible_become: false

  tasks:
    - name: Verify ansible inventory file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
      register: ansible_inventory_check

    - name: Fail if ansible inventory file is missing
      ansible.builtin.fail:
        msg: |
          inventory/ansible_inventory.json not found.

          Generate it from dryvist/tofu-proxmox-cluster:
            terragrunt output -json ansible_inventory > \
              ~/git/dryvist/ansible-server-apps/main/inventory/ansible_inventory.json

          Or sync from an existing deployment.
      when: not ansible_inventory_check.stat.exists

    - name: Load inventory JSON
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
        name: terraform_data

    - name: Validate inventory constants structure
      ansible.builtin.assert:
        that:
          - terraform_data is defined
          - terraform_data.constants is defined
          - terraform_data.constants.service_ports is defined
          - terraform_data.constants.syslog_ports is defined
        fail_msg: |
          ansible_inventory.json is missing the constants block.

          Expected:
            - terraform_data.constants.service_ports
            - terraform_data.constants.syslog_ports

          Re-run the upstream tofu output:
            terragrunt output -json ansible_inventory > \
              inventory/ansible_inventory.json

    - name: Validate Docker VM SSH key path is set when Docker VMs are present
      ansible.builtin.assert:
        that:
          - lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') | length > 0
        fail_msg: |
          PROXMOX_DKR_SSH_KEY_PATH environment variable is not set but Docker VM hosts exist.
          Docker VMs use direct SSH with a dedicated key separate from the Proxmox host key.
          Store it in SOPS (secrets.enc.yaml).
      when:
        - terraform_data.docker_vms is defined
        - terraform_data.docker_vms | length > 0

    - name: Add LXC containers to inventory (proxmox_pct_remote connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups: >-
          {{
            ['lxc_containers', 'all'] +
            (
              ['haproxy_group']
              if ('haproxy' in (item.value.tags | default([]))
                  or 'loadbalancer' in (item.value.tags | default([])))
              else []
            ) +
            (
              ['cribl_edge']
              if (
                'edge' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['cribl_stream_group']
              if (
                'stream' in (item.value.tags | default([])) and
                'cribl' in (item.value.tags | default([]))
              )
              else []
            ) +
            (
              ['mailpit_group']
              if 'smtp' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['ntfy_group']
              if 'push' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['mssql_group']
              if 'database' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['qdrant_group']
              if 'vectordb' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['llamaindex_group']
              if 'rag' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['apt_cacher_group']
              if 'apt-cache' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['minio_group']
              if 'minio' in (item.value.tags | default([]))
              else []
            ) +
            (
              ['technitium_dns_group']
              if 'dns' in (item.value.tags | default([]))
              else []
            )
          }}
        proxmox_vmid: "{{ item.value.vmid }}"
        ansible_host: "{{ lookup('env', 'PROXMOX_VE_HOSTNAME') }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: root
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        container_ip: "{{ item.value.ip }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ terraform_data.containers | dict2items }}"
      when:
        - terraform_data.containers is defined
        - terraform_data.containers | length > 0

    - name: Add VMs to inventory (SSH connection)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups:
          - vms
          - all
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ terraform_data.vms | dict2items }}"
      when:
        - terraform_data.vms is defined
        - terraform_data.vms | length > 0

    - name: Add Splunk VM to inventory (SSH connection)
      ansible.builtin.add_host:
        name: splunk
        groups:
          - splunk_group
          - splunk_vms
          - all
        ansible_host: "{{ terraform_data.splunk_vm.splunk.ip }}"
        ansible_connection: "{{ terraform_data.splunk_vm.splunk.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_SSH_KEY_PATH') }}"
        hostname: "{{ terraform_data.splunk_vm.splunk.hostname }}"
        vmid: "{{ terraform_data.splunk_vm.splunk.vmid }}"
      when: terraform_data.splunk_vm.splunk is defined

    # NOTE: Docker VMs (docker-host) are for TESTING/DEV ONLY.
    # Production syslog/netflow pipelines use native Cribl Edge/Stream
    # on LXC containers (cribl_edge, cribl_stream_group).
    - name: Add Docker VMs to inventory (SSH connection — testing/dev only)
      ansible.builtin.add_host:
        name: "{{ item.key }}"
        groups:
          - docker_vms
          - cribl_docker_group
          - all
        ansible_host: "{{ item.value.ip }}"
        ansible_connection: "{{ item.value.ansible_connection }}"
        ansible_user: debian
        ansible_ssh_private_key_file: "{{ lookup('env', 'PROXMOX_DKR_SSH_KEY_PATH') }}"
        hostname: "{{ item.value.hostname }}"
        vmid: "{{ item.value.vmid }}"
        host_tags: "{{ item.value.tags | default([]) }}"
      loop: "{{ terraform_data.docker_vms | dict2items }}"
      when:
        - terraform_data.docker_vms is defined
        - terraform_data.docker_vms | length > 0

    # Push terraform_data onto every dynamically-added host so roles can access
    # terraform_data.constants.* directly without hostvars['localhost'] indirection.
    - name: Propagate terraform_data to all inventory hosts
      ansible.builtin.set_fact:
        terraform_data: "{{ terraform_data }}"
      delegate_to: "{{ item }}"
      delegate_facts: true
      loop: "{{ groups['all'] | reject('equalto', 'localhost') | list }}"
      when: terraform_data is defined
