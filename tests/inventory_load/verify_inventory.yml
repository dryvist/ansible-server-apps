---
# Inventory load verification playbook
# Validates that load_terraform.yml correctly assigns dynamic groups
# from Terraform inventory tags.
#
# Usage (CI - uses fixture):
#   cp tests/inventory_load/ansible_inventory.json inventory/ansible_inventory.json
#   ansible-playbook tests/inventory_load/verify_inventory.yml \
#     -i inventory/hosts.yml -c local
#
# Covers:
#   - haproxy_group assigned for 'haproxy' tagged containers              (PR #117)
#   - cribl_edge group assigned for 'cribl'+'edge' tagged containers     (PR #36)
#   - cribl_stream_group assigned for 'cribl'+'stream' tagged containers
#   - mssql_group assigned for 'database' tagged containers              (PR #72)
#   - apt_cacher_group assigned for 'apt-cache' tagged containers
#   - lxc_containers populated for all terraform containers
#   - splunk_group / cribl_docker_group populated from their sections
#
# Note: hosts.yml pre-populates some groups (haproxy_group, cribl_edge,
# lxc_containers) with static hosts. These tests verify that terraform
# dynamic hosts are correctly added on top of any static entries.
# Static apt_cacher host has been removed from hosts.yml (container never provisioned).

- name: Load Terraform inventory
  import_playbook: ../../inventory/load_terraform.yml

- name: Verify dynamic group assignments
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Verify terraform_data constants were loaded
      ansible.builtin.assert:
        that:
          - hostvars['localhost']['terraform_data'] is defined
          - hostvars['localhost']['terraform_data']['constants'] is defined
          - hostvars['localhost']['terraform_data']['constants']['service_ports'] is defined
          - hostvars['localhost']['terraform_data']['constants']['syslog_ports'] is defined
        fail_msg: >-
          terraform_data.constants missing — inventory/load_terraform.yml
          did not load constants correctly

    - name: Verify netflow_ports in constants
      ansible.builtin.assert:
        that:
          - terraform_data.constants.netflow_ports is defined
          - terraform_data.constants.netflow_ports.unifi == 2055
        fail_msg: >-
          terraform_data.constants.netflow_ports missing or incorrect —
          expected unifi: 2055

    - name: Verify notification_ports in constants
      ansible.builtin.assert:
        that:
          - terraform_data.constants.notification_ports is defined
          - terraform_data.constants.notification_ports.mailpit_smtp == 1025
          - terraform_data.constants.notification_ports.mailpit_web == 8025
          - terraform_data.constants.notification_ports.ntfy_http == 8080
        fail_msg: >-
          terraform_data.constants.notification_ports missing or incorrect —
          expected mailpit_smtp: 1025, mailpit_web: 8025, ntfy_http: 8080

    - name: Verify vector_db_ports in constants
      ansible.builtin.assert:
        that:
          - terraform_data.constants.vector_db_ports is defined
          - terraform_data.constants.vector_db_ports.qdrant_http == 6333
          - terraform_data.constants.vector_db_ports.qdrant_grpc == 6334
        fail_msg: >-
          terraform_data.constants.vector_db_ports missing or incorrect —
          expected qdrant_http: 6333, qdrant_grpc: 6334

    - name: Verify terraform containers are in lxc_containers group
      ansible.builtin.assert:
        that:
          - groups['lxc_containers'] is defined
          - "'haproxy' in groups['lxc_containers']"
          - "'cribl-edge-01' in groups['lxc_containers']"
          - "'cribl-edge-02' in groups['lxc_containers']"
          - "'cribl-stream-01' in groups['lxc_containers']"
          - "'cribl-stream-02' in groups['lxc_containers']"
          - "'mssql' in groups['lxc_containers']"
          - "'apt-cacher-ng' in groups['lxc_containers']"
          - "'qdrant' in groups['lxc_containers']"
          - "'llamaindex' in groups['lxc_containers']"
          - "'mailpit' in groups['lxc_containers']"
          - "'ntfy' in groups['lxc_containers']"
        fail_msg: >-
          lxc_containers group is missing terraform hosts;
          current members: {{ groups['lxc_containers'] | default([]) | join(', ') }}

    - name: Verify haproxy_group contains 'haproxy'-tagged container
      ansible.builtin.assert:
        that:
          - groups['haproxy_group'] is defined
          - "'haproxy' in groups['haproxy_group']"
        fail_msg: >-
          haproxy_group should contain 'haproxy' (haproxy tag);
          got {{ groups['haproxy_group'] | default([]) }}

    - name: Verify cribl_edge group contains terraform 'cribl'+'edge' tagged containers
      ansible.builtin.assert:
        that:
          - groups['cribl_edge'] is defined
          - "'cribl-edge-01' in groups['cribl_edge']"
          - "'cribl-edge-02' in groups['cribl_edge']"
        fail_msg: >-
          cribl_edge should contain 'cribl-edge-01' and 'cribl-edge-02' (cribl+edge tags);
          got {{ groups['cribl_edge'] | default([]) }}

    - name: Verify cribl_stream_group contains terraform 'cribl'+'stream' tagged containers
      ansible.builtin.assert:
        that:
          - groups['cribl_stream_group'] is defined
          - "'cribl-stream-01' in groups['cribl_stream_group']"
          - "'cribl-stream-02' in groups['cribl_stream_group']"
        fail_msg: >-
          cribl_stream_group should contain 'cribl-stream-01' and 'cribl-stream-02' (cribl+stream tags);
          got {{ groups['cribl_stream_group'] | default([]) }}

    - name: Verify cribl-stream-01 is NOT in cribl_edge group
      ansible.builtin.assert:
        that:
          - "'cribl-stream-01' not in groups['cribl_edge']"
        fail_msg: >-
          cribl-stream-01 should NOT be in cribl_edge (has stream tag, not edge tag);
          got {{ groups['cribl_edge'] | default([]) }}

    - name: Verify mssql_group contains 'database'-tagged container
      ansible.builtin.assert:
        that:
          - groups['mssql_group'] is defined
          - "'mssql' in groups['mssql_group']"
        fail_msg: >-
          mssql_group should contain 'mssql' (database tag);
          got {{ groups['mssql_group'] | default([]) }}

    - name: Verify splunk is in splunk_group
      ansible.builtin.assert:
        that:
          - groups['splunk_group'] is defined
          - "'splunk' in groups['splunk_group']"
        fail_msg: >-
          splunk_group should contain 'splunk';
          got {{ groups['splunk_group'] | default([]) }}

    - name: Verify docker VMs are in cribl_docker_group
      ansible.builtin.assert:
        that:
          - groups['cribl_docker_group'] is defined
          - "'docker-host' in groups['cribl_docker_group']"
        fail_msg: >-
          cribl_docker_group should contain 'docker-host';
          got {{ groups['cribl_docker_group'] | default([]) }}

    - name: Assert apt-cacher-ng is in apt_cacher_group
      ansible.builtin.assert:
        that:
          - "'apt_cacher_group' in groups"
          - "'apt-cacher-ng' in groups['apt_cacher_group']"
        fail_msg: "apt-cacher-ng should be in apt_cacher_group (tag: apt-cache)"

    - name: Verify qdrant is in qdrant_group
      ansible.builtin.assert:
        that:
          - groups['qdrant_group'] is defined
          - "'qdrant' in groups['qdrant_group']"
        fail_msg: >-
          qdrant_group should contain 'qdrant' (vectordb tag);
          got {{ groups['qdrant_group'] | default([]) }}

    - name: Verify llamaindex is in llamaindex_group
      ansible.builtin.assert:
        that:
          - groups['llamaindex_group'] is defined
          - "'llamaindex' in groups['llamaindex_group']"
        fail_msg: >-
          llamaindex_group should contain 'llamaindex' (rag tag);
          got {{ groups['llamaindex_group'] | default([]) }}

    - name: Verify mailpit is in mailpit_group
      ansible.builtin.assert:
        that:
          - groups['mailpit_group'] is defined
          - "'mailpit' in groups['mailpit_group']"
        fail_msg: >-
          mailpit_group should contain 'mailpit' (smtp tag);
          got {{ groups['mailpit_group'] | default([]) }}

    - name: Verify ntfy is in ntfy_group
      ansible.builtin.assert:
        that:
          - groups['ntfy_group'] is defined
          - "'ntfy' in groups['ntfy_group']"
        fail_msg: >-
          ntfy_group should contain 'ntfy' (push tag);
          got {{ groups['ntfy_group'] | default([]) }}

    - name: Display group membership summary
      ansible.builtin.debug:
        msg: |
          Inventory group verification PASSED:
          - lxc_containers:      {{ groups['lxc_containers'] | default([]) | join(', ') }}
          - haproxy_group:       {{ groups['haproxy_group'] | default([]) | join(', ') }}
          - cribl_edge:          {{ groups['cribl_edge'] | default([]) | join(', ') }}
          - cribl_stream_group:  {{ groups['cribl_stream_group'] | default([]) | join(', ') }}
          - mssql_group:         {{ groups['mssql_group'] | default([]) | join(', ') }}
          - splunk_group:        {{ groups['splunk_group'] | default([]) | join(', ') }}
          - cribl_docker_group:  {{ groups['cribl_docker_group'] | default([]) | join(', ') }}
          - apt_cacher_group:    {{ groups['apt_cacher_group'] | default([]) | join(', ') }}
          - qdrant_group:        {{ groups['qdrant_group'] | default([]) | join(', ') }}
          - llamaindex_group:    {{ groups['llamaindex_group'] | default([]) | join(', ') }}
          - mailpit_group:      {{ groups['mailpit_group'] | default([]) | join(', ') }}
          - ntfy_group:         {{ groups['ntfy_group'] | default([]) | join(', ') }}
