---
# Logging Pipeline Validation Playbook
# Validates connectivity, service health, and data flow across the pipeline
#
# Production pipeline uses native Cribl on LXC containers:
#   - Cribl Edge (cribl_edge group): syslog processing
#   - Cribl Stream (cribl_stream_group): netflow/IPFIX processing
#   - HAProxy (haproxy_group): load balancing to Cribl LXCs
#   - Splunk (splunk_vms): search head and indexer
#
# Usage:
#   doppler run -- uv run ansible-playbook \
#     -i inventory/hosts.yml playbooks/validate-pipeline.yml

- name: Import Terraform infrastructure inventory
  import_playbook: ../inventory/load_terraform.yml

- name: Validate HAProxy Load Balancer
  hosts: haproxy_group
  become: true
  gather_facts: false
  tags:
    - haproxy
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for HAProxy validation
      ansible.builtin.service_facts:

    - name: Assert HAProxy service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['haproxy.service'] is defined
          - >-
            ansible_facts.services['haproxy.service'].state == 'running'
        fail_msg: >-
          HAProxy service is not running
        quiet: true

    - name: Check HAProxy configuration validity
      ansible.builtin.command:
        cmd: haproxy -c -f /etc/haproxy/haproxy.cfg
      register: haproxy_config_check
      changed_when: false
      failed_when: haproxy_config_check.rc != 0

    - name: Verify syslog ports are listening
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ constants.syslog_ports.values() | list | sort }}"

    - name: Verify netflow UDP port is listening
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: haproxy_netflow_udp
      changed_when: false
      failed_when: haproxy_netflow_udp.rc != 0

    - name: Verify stats page is accessible
      ansible.builtin.wait_for:
        port: "{{ constants.service_ports.haproxy_stats }}"
        timeout: 5

    - name: Get HAProxy backend status via stats socket
      ansible.builtin.command:
        cmd: >-
          socat - UNIX-CONNECT:/run/haproxy/admin.sock
        stdin: "show servers state\n"
      register: haproxy_backend
      changed_when: false
      failed_when: false

    - name: Display HAProxy validation results
      ansible.builtin.debug:
        msg: |
          HAProxy validation passed: config valid, all ports listening
          Backend status:
          {{ haproxy_backend.stdout | default('Socket not available') }}

- name: Validate Cribl Edge LXC Containers
  hosts: cribl_edge
  become: true
  gather_facts: false
  tags:
    - cribl_edge
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for Cribl Edge validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Edge service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl.service'] is defined
          - >-
            ansible_facts.services['cribl.service'].state == 'running'
        fail_msg: >-
          Cribl Edge service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Edge API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: edge_health

    - name: Verify syslog ports are listening on Cribl Edge
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ constants.syslog_ports.values() | list | sort }}"

    - name: Check Cribl Edge config directory exists
      ansible.builtin.stat:
        path: /opt/cribl/local/cribl
      register: cribl_edge_config_dir

    - name: Fail if Cribl Edge config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Edge config directory /opt/cribl/local/cribl not found
          on {{ inventory_hostname }}
      when: not cribl_edge_config_dir.stat.exists

    - name: Display Cribl Edge validation results
      ansible.builtin.debug:
        msg: |
          Cribl Edge validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ edge_health.status }}
          - Syslog ports: all listening
          - Config dir: present

- name: Validate Cribl Stream LXC Containers
  hosts: cribl_stream_group
  become: true
  gather_facts: false
  tags:
    - cribl_stream
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for Cribl Stream validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Stream service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl.service'] is defined
          - >-
            ansible_facts.services['cribl.service'].state == 'running'
        fail_msg: >-
          Cribl Stream service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Stream API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_stream_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: stream_health

    - name: Verify netflow UDP port is listening on Cribl Stream
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: stream_netflow_udp
      changed_when: false
      failed_when: stream_netflow_udp.rc != 0

    - name: Check Cribl Stream config directory exists
      ansible.builtin.stat:
        path: /opt/cribl/local/cribl
      register: cribl_stream_config_dir

    - name: Fail if Cribl Stream config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Stream config directory /opt/cribl/local/cribl not found
          on {{ inventory_hostname }}
      when: not cribl_stream_config_dir.stat.exists

    - name: Display Cribl Stream validation results
      ansible.builtin.debug:
        msg: |
          Cribl Stream validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ stream_health.status }}
          - NetFlow port {{ constants.netflow_ports.unifi }}: listening
          - Config dir: present

- name: Validate Cribl Edge Metrics
  hosts: cribl_edge
  become: true
  gather_facts: false
  tags:
    - cribl_edge_metrics
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Check Cribl Edge has active inputs
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/system/metrics
        method: GET
        headers: "{{
          {'Authorization': 'Bearer ' + cribl_edge_api_token}
          if cribl_edge_api_token is defined
          and cribl_edge_api_token | length > 0
          else omit
          }}"
        status_code:
          - 200
      register: cribl_metrics
      failed_when: cribl_metrics.status != 200
      changed_when: false

    - name: Display Cribl Edge metrics validation result
      ansible.builtin.debug:
        msg: |
          Cribl Edge metrics check passed on {{ inventory_hostname }}: API responded with 200
          (auth token used: {{ (cribl_edge_api_token is defined and cribl_edge_api_token | length > 0) | string }})
          status: {{ cribl_metrics.status }}

- name: E2E Data Pipeline Validation (Syslog via Cribl Edge)
  hosts: cribl_edge[0]
  become: true
  gather_facts: true
  tags:
    - e2e
    - data_validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"
    # Generate unique test event ID using epoch timestamp
    e2e_test_event_id: "E2E_VALIDATION_{{ ansible_date_time.epoch }}"
    # Splunk connection details (no hardcoded fallback)
    splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Install netcat for syslog testing
      ansible.builtin.apt:
        name: netcat-openbsd
        state: present
        update_cache: true

    - name: Send test syslog message through pipeline
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          echo "<14>{{ ansible_date_time.iso8601 }} ansible-e2e-test: \
          {{ e2e_test_event_id }}" | \
          nc -u -w1 localhost {{ constants.syslog_ports.unifi }}
        executable: /bin/bash
      changed_when: false

    - name: Wait for event to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for test event to propagate through Cribl Edge to Splunk...

    # Pipeline latency assertion: poll up to 120 seconds (retries: 12, delay: 10)
    # The loop fails the play if the event does not appear within 120 seconds.
    - name: Query Splunk for test event (pipeline latency assertion, 120s timeout)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: 'search index=* "{{ e2e_test_event_id }}" | head 1'
          output_mode: json
          exec_mode: oneshot
      register: splunk_search_result
      retries: 12
      delay: 10
      until: >-
        splunk_search_result.status == 200 and
        (splunk_search_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_search_result.status != 200 or
        (splunk_search_result.json.results | default([]) | length == 0)

    - name: Query Splunk for test event in unifi index
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: 'search index=unifi "{{ e2e_test_event_id }}" | head 1'
          output_mode: json
          exec_mode: oneshot
      register: splunk_unifi_index_result
      retries: 6
      delay: 10
      until: >-
        splunk_unifi_index_result.status == 200 and
        (splunk_unifi_index_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_unifi_index_result.status != 200 or
        (splunk_unifi_index_result.json.results | default([]) | length == 0)

    - name: E2E Data Pipeline PASSED
      ansible.builtin.debug:
        msg: |
          === E2E DATA PIPELINE VALIDATION PASSED ===
          Test event sent via syslog port {{ constants.syslog_ports.unifi }}
          Event ID: {{ e2e_test_event_id }}
          Splunk host: {{ splunk_host }}
          Search results (index=*): {{ splunk_search_result.json.results | length }} event(s) found
          Search results (index=unifi): {{ splunk_unifi_index_result.json.results | length }} event(s) found
          Full pipeline verified: Source -> Cribl Edge LXC -> Splunk HEC -> Splunk Index (unifi)

- name: E2E Validation via HAProxy (full path)
  hosts: cribl_edge[0]
  become: true
  gather_facts: true
  tags:
