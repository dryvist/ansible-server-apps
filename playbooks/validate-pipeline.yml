    - haproxy
    - data_validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"
    # Generate unique test event ID using epoch timestamp
    e2e_test_event_id: "E2E_HAPROXY_{{ ansible_date_time.epoch }}"
    # Splunk connection details (no hardcoded fallback)
    splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Install netcat for syslog testing
      ansible.builtin.apt:
        name: netcat-openbsd
        state: present
        update_cache: true

    - name: Send test syslog message through HAProxy
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          echo "<14>{{ ansible_date_time.iso8601 }} ansible-e2e-haproxy-test: \
          {{ e2e_test_event_id }}" | \
          nc -u -w1 {{ hostvars['haproxy']['container_ip'] }} {{ constants.syslog_ports.unifi }}
        executable: /bin/bash
      changed_when: false

    - name: Wait for event to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for test event to propagate through HAProxy -> Cribl Edge -> Splunk...

    # Pipeline latency assertion: poll up to 120 seconds (retries: 12, delay: 10)
    # The loop fails the play if the event does not appear within 120 seconds.
    - name: Query Splunk for HAProxy test event in unifi index (pipeline latency assertion, 120s timeout)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: 'search index=unifi "{{ e2e_test_event_id }}" | head 1'
          output_mode: json
          exec_mode: oneshot
      register: splunk_haproxy_result
      retries: 12
      delay: 10
      until: >-
        splunk_haproxy_result.status == 200 and
        (splunk_haproxy_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_haproxy_result.status != 200 or
        (splunk_haproxy_result.json.results | default([]) | length == 0)

    - name: E2E HAProxy Data Pipeline PASSED
      ansible.builtin.debug:
        msg: |
          === E2E HAPROXY PIPELINE VALIDATION PASSED ===
          Test event sent via HAProxy VIP {{ hostvars['haproxy']['container_ip'] }}
          Syslog port: {{ constants.syslog_ports.unifi }}
          Event ID: {{ e2e_test_event_id }}
          Splunk host: {{ splunk_host }}
          Search results (index=unifi): {{ splunk_haproxy_result.json.results | length }} event(s) found
          Full path verified: Source -> HAProxy -> Cribl Edge LXC -> Splunk HEC -> Splunk Index (unifi)

- name: Validate NetFlow Port
  hosts: cribl_stream_group[0]
  become: true
  gather_facts: true
  tags:
    - netflow
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"
    # Splunk connection details (no hardcoded fallback)
    splunk_host: "{{ hostvars['splunk']['ansible_host'] }}"
    splunk_port: "{{ constants.service_ports.splunk_mgmt }}"
    splunk_user: admin
    # SPLUNK_PASSWORD must be set via Doppler
    splunk_password: "{{ lookup('env', 'SPLUNK_PASSWORD') }}"

  tasks:
    - name: Verify SPLUNK_PASSWORD is set
      ansible.builtin.assert:
        that:
          - splunk_password | length > 0
        fail_msg: >-
          SPLUNK_PASSWORD environment variable must be set.
          Run with doppler run --
        quiet: true

    - name: Check netflow UDP port is listening
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: netflow_port_check
      failed_when: netflow_port_check.rc != 0
      changed_when: false

    - name: Generate unique sentinel port for NetFlow test correlation
      ansible.builtin.set_fact:
        netflow_sentinel_port: "{{ 40000 + (ansible_date_time.epoch | int % 25000) }}"

    - name: Send minimal NetFlow v5 test packet
      ansible.builtin.shell:
        cmd: |
          python3 -c "
          import socket, struct, time

          # NetFlow v5 header: version=5, count=1, uptime=0
          # epoch, nanosec, flow_seq=1, engine=0, sampling=0
          epoch = int(time.time())
          header = struct.pack('!HHIIIIBBH',
              5,       # version
              1,       # count (1 flow record)
              0,       # sys_uptime_ms
              epoch,   # unix_secs
              0,       # unix_nsecs
              1,       # flow_sequence
              0,       # engine_type + engine_id (packed as one byte each below)
              0,       # engine_id
              0        # sampling_interval
          )

          # NetFlow v5 flow record (48 bytes): minimal valid record
          # Uses sentinel src_port for test correlation in Splunk
          record = struct.pack('!IIIHHIIIIHHBBBBHHBBH',
              0x0A000001,  # src_addr 10.0.0.1
              0x0A000002,  # dst_addr 10.0.0.2
              0,           # next_hop
              0,           # snmp_input
              0,           # snmp_output
              1,           # packets
              64,          # octets
              0,           # first_switched
              0,           # last_switched
              {{ netflow_sentinel_port }},  # src_port (sentinel)
              80,          # dst_port
              0,           # pad1
              6,           # tcp_flags
              6,           # protocol (TCP)
              0,           # tos
              0,           # src_as
              0,           # dst_as
              0,           # src_mask
              0,           # dst_mask
              0            # pad2
          )

          sock = socket.socket(socket.AF_INET, socket.SOCK_DGRAM)
          sock.sendto(header + record, ('127.0.0.1', {{ constants.netflow_ports.unifi }}))
          sock.close()
          print('NetFlow v5 test packet sent with sentinel src_port={{ netflow_sentinel_port }}')
          "
        executable: /bin/bash
      changed_when: false

    - name: Wait for NetFlow event to propagate through pipeline
      ansible.builtin.pause:
        seconds: 10
        prompt: >-
          Waiting for NetFlow test event to propagate through Cribl Stream to Splunk...

    # Pipeline latency assertion: poll up to 120 seconds (retries: 12, delay: 10)
    # The loop fails the play if the event does not appear within 120 seconds.
    - name: Query Splunk for NetFlow event in network index (pipeline latency assertion, 120s timeout)
      ansible.builtin.uri:
        url: >-
          https://{{ splunk_host }}:{{ splunk_port
          }}/services/search/jobs
        method: POST
        user: "{{ splunk_user }}"
        password: "{{ splunk_password }}"
        force_basic_auth: true
        validate_certs: false
        body_format: form-urlencoded
        body:
          search: 'search index=network earliest=-5m src_port={{ netflow_sentinel_port }} | head 1'
          output_mode: json
          exec_mode: oneshot
      register: splunk_netflow_result
      retries: 12
      delay: 10
      until: >-
        splunk_netflow_result.status == 200 and
        (splunk_netflow_result.json.results | default([]) | length > 0)
      failed_when: >-
        splunk_netflow_result.status != 200 or
        (splunk_netflow_result.json.results | default([]) | length == 0)

    - name: Display NetFlow validation result
      ansible.builtin.debug:
        msg: |
          === NETFLOW VALIDATION PASSED ===
          NetFlow port {{ constants.netflow_ports.unifi }} UDP is listening
          {{ netflow_port_check.stdout }}
          NetFlow v5 test packet sent and event found in Splunk
          Splunk host: {{ splunk_host }}
          Search results (index=network): {{ splunk_netflow_result.json.results | length }} event(s) found
          Full path verified: NetFlow source -> Cribl Stream LXC -> Splunk HEC -> Splunk Index (network)

- name: Validate Qdrant Vector Database
  hosts: qdrant_group
  become: true
  gather_facts: false
  tags:
    - qdrant
    - validation

  tasks:
    - name: Load terraform data for Qdrant validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/terraform_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for Qdrant validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify qdrant container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=qdrant --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: qdrant_container_check
      changed_when: false
      failed_when: "'qdrant' not in qdrant_container_check.stdout"

    - name: Set Qdrant port facts
      ansible.builtin.set_fact:
        _qdrant_http_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_http'] }}
        _qdrant_grpc_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_grpc'] }}

    - name: Wait for Qdrant HTTP health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _qdrant_http_port }}/healthz"
        method: GET
        status_code: 200
      register: qdrant_health
      retries: 6
      delay: 5
      until: qdrant_health.status == 200
      changed_when: false

    - name: Wait for Qdrant gRPC port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _qdrant_grpc_port }}"
        timeout: 30

    - name: Display Qdrant validation results
      ansible.builtin.debug:
        msg: |
          Qdrant validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: qdrant running
          - HTTP health: {{ qdrant_health.status }}
          - gRPC port: listening

- name: Validate LlamaIndex RAG Engine
  hosts: llamaindex_group
  become: true
  gather_facts: false
  tags:
    - llamaindex
    - validation

  tasks:
    - name: Load terraform data for LlamaIndex validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/terraform_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for LlamaIndex validation
      ansible.builtin.service_facts:

    - name: Assert Ollama service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['ollama.service'] is defined
          - >-
            ansible_facts.services['ollama.service'].state == 'running'
        fail_msg: >-
          Ollama service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify embedding model is available
      ansible.builtin.command:
        cmd: ollama list
      register: llamaindex_model_list
      changed_when: false
      failed_when: "'nomic-embed-text' not in llamaindex_model_list.stdout"

    - name: Test Ollama embedding API endpoint
      ansible.builtin.uri:
        url: "http://localhost:11434/api/tags"
        method: GET
        status_code: 200
      register: llamaindex_ollama_api
      retries: 3
      delay: 5
      until: llamaindex_ollama_api.status == 200
      changed_when: false

    - name: Set Qdrant connection facts
      ansible.builtin.set_fact:
        _qdrant_host: "{{ hostvars['qdrant']['container_ip'] }}"
        _qdrant_http_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_http'] }}

    - name: Verify connectivity to Qdrant health endpoint
      ansible.builtin.uri:
        url: "http://{{ _qdrant_host }}:{{ _qdrant_http_port }}/healthz"
        method: GET
        status_code: 200
      register: llamaindex_qdrant_check
      retries: 3
      delay: 5
      until: llamaindex_qdrant_check.status == 200
      changed_when: false

    - name: Display LlamaIndex validation results
      ansible.builtin.debug:
        msg: |
          LlamaIndex validation passed on {{ inventory_hostname }}:
          - Ollama: running
          - Model nomic-embed-text: available
          - Ollama API: responding
          - Qdrant connectivity: healthy

- name: Validate Mailpit Notification Service
  hosts: mailpit_group
  become: true
  gather_facts: false
  tags:
    - mailpit
    - validation

  tasks:
    - name: Load terraform data for Mailpit validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/terraform_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for Mailpit validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify mailpit container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=mailpit --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: mailpit_container_check
      changed_when: false
      failed_when: "'mailpit' not in mailpit_container_check.stdout"

    - name: Set Mailpit port facts
      ansible.builtin.set_fact:
        _mailpit_smtp_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['notification_ports']['mailpit_smtp'] }}
        _mailpit_web_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['notification_ports']['mailpit_web'] }}

    - name: Wait for Mailpit SMTP port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _mailpit_smtp_port }}"
        timeout: 30

    - name: Verify Mailpit web UI is responding
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _mailpit_web_port }}"
        method: GET
        status_code: 200
      register: mailpit_web_check
      retries: 3
      delay: 5
      until: mailpit_web_check.status == 200
      changed_when: false

    - name: Display Mailpit validation results
      ansible.builtin.debug:
        msg: |
          Mailpit validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: mailpit running
          - SMTP port {{ _mailpit_smtp_port }}: listening
          - Web UI port {{ _mailpit_web_port }}: responding

