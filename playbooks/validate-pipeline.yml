---
# Logging Pipeline Validation Playbook (Cribl side only)
#
# Validates connectivity, service health, and that the pipeline up to
# (but not through) Splunk HEC is healthy:
#   - HAProxy (haproxy_group): config + ports + backends
#   - Cribl Edge (cribl_edge): service + API + syslog ports
#   - Cribl Stream (cribl_stream_group): service + API + NetFlow port
#   - Cribl Edge metrics endpoint
#   - Qdrant, LlamaIndex, Mailpit, ntfy, MSSQL, MinIO health
#
# The Splunk side -- whether events landed in the Splunk index --
# is owned by JacobPEvans/ansible-splunk and validated there.
# See docs/adr/0004-splunk-linkage-via-docs-only.md and
# docs/adr/0010-splunk-parallel-hec-cutover.md.
#
# Usage:
#   sops exec-env secrets.enc.yaml \
#     'ansible-playbook -i inventory/hosts.yml playbooks/validate-pipeline.yml'

- name: Import infrastructure inventory
  import_playbook: ../inventory/load_terraform.yml

- name: Validate HAProxy Load Balancer
  hosts: haproxy_group
  become: true
  gather_facts: false
  tags:
    - haproxy
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for HAProxy validation
      ansible.builtin.service_facts:

    - name: Assert HAProxy service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['haproxy.service'] is defined
          - >-
            ansible_facts.services['haproxy.service'].state == 'running'
        fail_msg: >-
          HAProxy service is not running
        quiet: true

    - name: Check HAProxy configuration validity
      ansible.builtin.command:
        cmd: haproxy -c -f /etc/haproxy/haproxy.cfg
      register: haproxy_config_check
      changed_when: false
      failed_when: haproxy_config_check.rc != 0

    - name: Verify syslog ports are listening
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ constants.syslog_ports.values() | list | sort }}"

    - name: Verify netflow UDP port is listening
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: haproxy_netflow_udp
      changed_when: false
      failed_when: haproxy_netflow_udp.rc != 0

    - name: Verify stats page is accessible
      ansible.builtin.wait_for:
        port: "{{ constants.service_ports.haproxy_stats }}"
        timeout: 5

    - name: Get HAProxy backend status via stats socket
      ansible.builtin.command:
        cmd: >-
          socat - UNIX-CONNECT:/run/haproxy/admin.sock
        stdin: "show servers state\n"
      register: haproxy_backend
      changed_when: false
      failed_when: false

    - name: Display HAProxy validation results
      ansible.builtin.debug:
        msg: |
          HAProxy validation passed: config valid, all ports listening
          Backend status:
          {{ haproxy_backend.stdout | default('Socket not available') }}

- name: Validate Cribl Edge LXC Containers
  hosts: cribl_edge
  become: true
  gather_facts: false
  tags:
    - cribl_edge
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for Cribl Edge validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Edge service is running
      # `cribl boot-start enable` after `cribl mode-edge` creates the unit
      # as `cribl-edge.service`, not `cribl.service`. Must match the role
      # default `cribl_edge_service_name: cribl-edge`.
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl-edge.service'] is defined
          - >-
            ansible_facts.services['cribl-edge.service'].state == 'running'
        fail_msg: >-
          Cribl Edge service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Edge API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: edge_health

    - name: Verify syslog ports are listening on Cribl Edge
      ansible.builtin.wait_for:
        port: "{{ item }}"
        timeout: 5
      loop: "{{ constants.syslog_ports.values() | list | sort }}"

    - name: Check Cribl Edge config directory exists
      ansible.builtin.stat:
        path: /opt/cribl/local/cribl
      register: cribl_edge_config_dir

    - name: Fail if Cribl Edge config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Edge config directory /opt/cribl/local/cribl not found
          on {{ inventory_hostname }}
      when: not cribl_edge_config_dir.stat.exists

    - name: Display Cribl Edge validation results
      ansible.builtin.debug:
        msg: |
          Cribl Edge validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ edge_health.status }}
          - Syslog ports: all listening
          - Config dir: present

- name: Validate Cribl Stream LXC Containers
  hosts: cribl_stream_group
  become: true
  gather_facts: false
  tags:
    - cribl_stream
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Gather service facts for Cribl Stream validation
      ansible.builtin.service_facts:

    - name: Assert Cribl Stream service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['cribl.service'] is defined
          - >-
            ansible_facts.services['cribl.service'].state == 'running'
        fail_msg: >-
          Cribl Stream service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify Cribl Stream API health endpoint
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_stream_api
          }}/api/v1/health
        method: GET
        return_content: true
        status_code: 200
      register: stream_health

    - name: Verify netflow UDP port is listening on Cribl Stream
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: stream_netflow_udp
      changed_when: false
      failed_when: stream_netflow_udp.rc != 0

    - name: Check Cribl Stream config directory exists
      ansible.builtin.stat:
        path: /opt/cribl/local/cribl
      register: cribl_stream_config_dir

    - name: Fail if Cribl Stream config directory is missing
      ansible.builtin.fail:
        msg: >-
          Cribl Stream config directory /opt/cribl/local/cribl not found
          on {{ inventory_hostname }}
      when: not cribl_stream_config_dir.stat.exists

    - name: Display Cribl Stream validation results
      ansible.builtin.debug:
        msg: |
          Cribl Stream validation passed on {{ inventory_hostname }}:
          - Service: running
          - Health API: {{ stream_health.status }}
          - NetFlow port {{ constants.netflow_ports.unifi }}: listening
          - Config dir: present

- name: Validate Cribl Edge Metrics
  hosts: cribl_edge
  become: true
  gather_facts: false
  tags:
    - cribl_edge_metrics
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Check Cribl Edge has active inputs
      ansible.builtin.uri:
        url: >-
          http://127.0.0.1:{{ constants.service_ports.cribl_edge_api
          }}/api/v1/system/metrics
        method: GET
        headers: "{{
          {'Authorization': 'Bearer ' + cribl_edge_api_token}
          if cribl_edge_api_token is defined
          and cribl_edge_api_token | length > 0
          else omit
          }}"
        status_code:
          - 200
      register: cribl_metrics
      failed_when: cribl_metrics.status != 200
      changed_when: false

    - name: Display Cribl Edge metrics validation result
      ansible.builtin.debug:
        msg: |
          Cribl Edge metrics check passed on {{ inventory_hostname }}: API responded with 200
          (auth token used: {{ (cribl_edge_api_token is defined and cribl_edge_api_token | length > 0) | string }})
          status: {{ cribl_metrics.status }}

- name: Validate NetFlow Port Listener
  hosts: cribl_stream_group[0]
  become: true
  gather_facts: true
  tags:
    - netflow
    - validation

  vars:
    constants: "{{ hostvars['localhost']['terraform_data']['constants'] }}"

  tasks:
    - name: Check netflow UDP port is listening
      ansible.builtin.shell:
        cmd: |
          set -o pipefail
          ss -ulnp | grep ':{{ constants.netflow_ports.unifi }}'
        executable: /bin/bash
      register: netflow_port_check
      failed_when: netflow_port_check.rc != 0
      changed_when: false

    - name: Display NetFlow validation result
      ansible.builtin.debug:
        msg: |
          === NETFLOW PORT VALIDATION PASSED ===
          NetFlow port {{ constants.netflow_ports.unifi }} UDP is listening
          {{ netflow_port_check.stdout }}
          (End-to-end Splunk index validation lives in JacobPEvans/ansible-splunk.)

- name: Validate Qdrant Vector Database
  hosts: qdrant_group
  become: true
  gather_facts: false
  tags:
    - qdrant
    - validation

  tasks:
    - name: Load inventory data for Qdrant validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for Qdrant validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify qdrant container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=qdrant --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: qdrant_container_check
      changed_when: false
      failed_when: "'qdrant' not in qdrant_container_check.stdout"

    - name: Set Qdrant port facts
      ansible.builtin.set_fact:
        _qdrant_http_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_http'] }}
        _qdrant_grpc_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_grpc'] }}

    - name: Wait for Qdrant HTTP health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _qdrant_http_port }}/healthz"
        method: GET
        status_code: 200
      register: qdrant_health
      retries: 6
      delay: 5
      until: qdrant_health.status == 200
      changed_when: false

    - name: Wait for Qdrant gRPC port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _qdrant_grpc_port }}"
        timeout: 30

    - name: Display Qdrant validation results
      ansible.builtin.debug:
        msg: |
          Qdrant validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: qdrant running
          - HTTP health: {{ qdrant_health.status }}
          - gRPC port: listening

- name: Validate LlamaIndex RAG Engine
  hosts: llamaindex_group
  become: true
  gather_facts: false
  tags:
    - llamaindex
    - validation

  tasks:
    - name: Load inventory data for LlamaIndex validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for LlamaIndex validation
      ansible.builtin.service_facts:

    - name: Assert Ollama service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['ollama.service'] is defined
          - >-
            ansible_facts.services['ollama.service'].state == 'running'
        fail_msg: >-
          Ollama service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify embedding model is available
      ansible.builtin.command:
        cmd: ollama list
      register: llamaindex_model_list
      changed_when: false
      failed_when: "'nomic-embed-text' not in llamaindex_model_list.stdout"

    - name: Test Ollama embedding API endpoint
      ansible.builtin.uri:
        url: "http://localhost:11434/api/tags"
        method: GET
        status_code: 200
      register: llamaindex_ollama_api
      retries: 3
      delay: 5
      until: llamaindex_ollama_api.status == 200
      changed_when: false

    - name: Set Qdrant connection facts
      ansible.builtin.set_fact:
        _qdrant_host: "{{ hostvars['qdrant']['container_ip'] }}"
        _qdrant_http_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports']['qdrant_http'] }}

    - name: Verify connectivity to Qdrant health endpoint
      ansible.builtin.uri:
        url: "http://{{ _qdrant_host }}:{{ _qdrant_http_port }}/healthz"
        method: GET
        status_code: 200
      register: llamaindex_qdrant_check
      retries: 3
      delay: 5
      until: llamaindex_qdrant_check.status == 200
      changed_when: false

    - name: Display LlamaIndex validation results
      ansible.builtin.debug:
        msg: |
          LlamaIndex validation passed on {{ inventory_hostname }}:
          - Ollama: running
          - Model nomic-embed-text: available
          - Ollama API: responding
          - Qdrant connectivity: healthy

- name: Validate Mailpit Notification Service
  hosts: mailpit_group
  become: true
  gather_facts: false
  tags:
    - mailpit
    - validation

  tasks:
    - name: Load inventory data for Mailpit validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for Mailpit validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify mailpit container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=mailpit --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: mailpit_container_check
      changed_when: false
      failed_when: "'mailpit' not in mailpit_container_check.stdout"

    - name: Set Mailpit port facts
      ansible.builtin.set_fact:
        _mailpit_smtp_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['notification_ports']['mailpit_smtp'] }}
        _mailpit_web_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['notification_ports']['mailpit_web'] }}

    - name: Wait for Mailpit SMTP port
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ _mailpit_smtp_port }}"
        timeout: 30

    - name: Verify Mailpit web UI is responding
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _mailpit_web_port }}"
        method: GET
        status_code: 200
      register: mailpit_web_check
      retries: 3
      delay: 5
      until: mailpit_web_check.status == 200
      changed_when: false

    - name: Display Mailpit validation results
      ansible.builtin.debug:
        msg: |
          Mailpit validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: mailpit running
          - SMTP port {{ _mailpit_smtp_port }}: listening
          - Web UI port {{ _mailpit_web_port }}: responding

- name: Validate ntfy Push Notification Service
  hosts: ntfy_group
  become: true
  gather_facts: false
  tags:
    - ntfy
    - validation

  tasks:
    - name: Load inventory data for ntfy validation
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../inventory/ansible_inventory.json"
        name: terraform_data
      delegate_to: localhost
      run_once: true

    - name: Gather service facts for ntfy validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify ntfy container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=ntfy --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: ntfy_container_check
      changed_when: false
      failed_when: "'ntfy' not in ntfy_container_check.stdout"

    - name: Set ntfy port facts
      ansible.builtin.set_fact:
        _ntfy_http_port: >-
          {{ hostvars['localhost']['terraform_data']['constants']['notification_ports']['ntfy_http'] }}

    - name: Verify ntfy health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ _ntfy_http_port }}/v1/health"
        method: GET
        status_code: 200
      register: ntfy_health_check
      retries: 3
      delay: 5
      until: ntfy_health_check.status == 200
      changed_when: false

    - name: Display ntfy validation results
      ansible.builtin.debug:
        msg: |
          ntfy validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: ntfy running
          - Health endpoint port {{ _ntfy_http_port }}: responding

- name: Validate MSSQL Docker Service
  hosts: mssql_group
  become: true
  gather_facts: false
  tags:
    - mssql_docker
    - validation

  tasks:
    - name: Gather service facts for MSSQL validation
      ansible.builtin.service_facts:

    - name: Assert Docker service is running
      ansible.builtin.assert:
        that:
          - >-
            ansible_facts.services['docker.service'] is defined
          - >-
            ansible_facts.services['docker.service'].state == 'running'
        fail_msg: >-
          Docker service is not running on {{ inventory_hostname }}
        quiet: true

    - name: Verify mssql container is running
      ansible.builtin.command:
        cmd: docker ps --filter name=mssql --filter status=running --format {% raw %}"{{ .Names }}"{% endraw %}
      register: mssql_container_check
      changed_when: false
      failed_when: "'mssql' not in mssql_container_check.stdout"

    # Port 1433 is the standard SQL Server port. No constant exists yet;
    # move to constants.service_ports.mssql when the upstream tofu module
    # defines it.
    - name: Wait for MSSQL port 1433
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 1433
        timeout: 30

    - name: Display MSSQL validation results
      ansible.builtin.debug:
        msg: |
          MSSQL validation passed on {{ inventory_hostname }}:
          - Docker: running
          - Container: mssql running
          - Port 1433: listening

- name: Validate MinIO Object Storage
  hosts: minio_group
  become: true
  gather_facts: false
  tags:
    - minio
    - validation

  # Load role defaults for minio_api_port, minio_install_dir,
  # minio_default_buckets, minio_noncurrent_expiration_days. group_vars are
  # empty for this role today; when overrides are introduced later, move
  # those vars to group_vars/minio_group.yml so they win over these defaults.
  vars_files:
    - ../roles/minio/defaults/main.yml

  tasks:
    - name: Assert MinIO service is running
      ansible.builtin.service_facts:
      register: minio_service_facts

    - name: Fail if MinIO service is not running
      ansible.builtin.assert:
        that:
          - >-
            minio_service_facts.ansible_facts.services['minio.service'].state
            == 'running'
        fail_msg: "MinIO service is not running on {{ inventory_hostname }}"
        quiet: true

    - name: Verify MinIO health endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ minio_api_port }}/minio/health/live"
        status_code: 200
      register: minio_health
      retries: 3
      delay: 3
      until: minio_health.status == 200
      changed_when: false

    - name: Verify each default bucket exists
      ansible.builtin.command:
        cmd: "{{ minio_install_dir }}/mc ls local/{{ item.name }}"
      loop: "{{ minio_default_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false

    - name: Verify versioning is enabled on each versioned bucket
      ansible.builtin.command:
        cmd: "{{ minio_install_dir }}/mc version info local/{{ item.name }}"
      loop: "{{ minio_default_buckets | selectattr('versioning', 'defined') | selectattr('versioning') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: minio_version_check
      changed_when: false
      failed_when: "'versioning is enabled' not in minio_version_check.stdout"

    - name: Verify anonymous download policy on each download bucket
      ansible.builtin.command:
        cmd: "{{ minio_install_dir }}/mc anonymous get local/{{ item.name }}"
      loop: "{{ minio_default_buckets | selectattr('policy', 'equalto', 'download') | list }}"
      loop_control:
        label: "{{ item.name }}"
      register: minio_policy_check
      changed_when: false
      failed_when: "'download' not in minio_policy_check.stdout"

    - name: Verify noncurrent-expiration lifecycle rule is present on versioned buckets
      ansible.builtin.command:
        cmd: "{{ minio_install_dir }}/mc ilm rule ls --json local/{{ item.name }}"
      loop: >-
        {{ minio_default_buckets
           | selectattr('versioning', 'defined')
           | selectattr('versioning')
           | list }}
      loop_control:
        label: "{{ item.name }}"
      register: minio_ilm_query
      changed_when: false
      failed_when: >-
        ((minio_ilm_query.stdout | default('{}') | from_json).config.Rules
         | default([])
         | selectattr('NoncurrentVersionExpiration', 'defined')
         | list | length) == 0

    - name: Display MinIO validation results
      ansible.builtin.debug:
        msg: |
          MinIO validation passed on {{ inventory_hostname }}:
          - Service: running, health 200
          - Buckets: {{ minio_default_buckets | map(attribute='name') | join(', ') }}
          - Lifecycle: noncurrent-expiration rule present

- name: Pipeline Summary
  hosts: localhost
  gather_facts: false
  tags:
    - summary

  tasks:
    - name: Display pipeline validation summary
      ansible.builtin.debug:
        msg: |
          ============================================
          LOGGING PIPELINE VALIDATION COMPLETE (Cribl side)
          ============================================
          HAProxy:      Config valid, ports listening
          Cribl Edge:   LXC services healthy, APIs responding
          Cribl Stream: LXC services healthy, APIs responding
          NetFlow:      Port listening (Splunk index check in ansible-splunk)
          Cribl Edge:   Metrics API responding
          Qdrant:       Docker running, HTTP+gRPC healthy
          LlamaIndex:   Ollama running, model loaded, Qdrant reachable
          Mailpit:      Docker running, SMTP+Web healthy
          ntfy:         Docker running, health endpoint healthy
          MSSQL:        Docker running, port 1433 listening
          MinIO:        Service, bucket, versioning, policy, lifecycle
          ============================================
          Pipeline (Cribl side) ready for log ingestion.
          End-to-end Splunk index validation: see ansible-splunk.
