# =============================================================================
# Phase 4: Notification Services
# Mailpit SMTP relay and ntfy push notifications
# =============================================================================

- name: Configure Mailpit SMTP relay
  hosts: mailpit_group
  become: true
  gather_facts: false
  tags:
    - mailpit
    - notifications
    - smtp
  roles:
    - role: mailpit_docker

- name: Configure ntfy push notification server
  hosts: ntfy_group
  become: true
  gather_facts: false
  tags:
    - ntfy
    - notifications
    - push
  roles:
    - role: ntfy_docker

# =============================================================================
# Phase 5: Microsoft SQL Server
# Deploy SQL Server 2022 on Docker in LXC container
# =============================================================================

- name: Configure Microsoft SQL Server
  hosts: mssql_group
  become: true
  gather_facts: false
  tags:
    - mssql_docker
    - database
  roles:
    - role: mssql_docker
