---
# Import infrastructure inventory before running application playbooks.
# Populates inventory dynamically from inventory/ansible_inventory.json.
# Must run with gather_facts: false to avoid Gathering Facts task.
- name: Load infrastructure inventory
  import_playbook: ../inventory/load_terraform.yml

# Cluster-aware execution
# -----------------------
# `serial: 1` is the global default for plays that target the
# (future) 3-node Proxmox cluster, so node-by-node rollout is the
# default rather than a special case. Per-role overrides are allowed
# either with a play-level `serial:` override or via group_vars.
#
# Today this is mostly belt-and-braces: most roles target singletons
# (e.g. one HAProxy LXC, one Mailpit LXC). It becomes load-bearing
# when the same app gets rolled out across all 3 cluster nodes.

# =============================================================================
# Phase 0: APT Cache Infrastructure
# apt-cacher-ng must be deployed BEFORE any roles that install apt packages
# =============================================================================

- name: Deploy apt-cacher-ng caching proxy
  hosts: apt_cacher_group
  become: true
  gather_facts: true
  serial: 1
  tags:
    - apt_cacher_ng
    - apt_proxy
    - lxc
  roles:
    - role: apt_cacher_ng

- name: Configure apt proxy on LXC containers
  hosts: lxc_containers:!apt_cacher_group
  become: true
  gather_facts: false
  tags:
    - apt_proxy
    - lxc
  tasks:
    - name: Configure apt proxy
      when: "'apt-cacher-ng' in hostvars"
      vars:
        _apt_cache_ip: >-
          {{ hostvars['apt-cacher-ng']['container_ip'] }}
        _apt_cache_port: >-
          {{ hostvars['localhost']['terraform_data']
             ['constants']['service_ports']['apt_cacher_ng']
             | default(3142) }}
      ansible.builtin.copy:
        dest: /etc/apt/apt.conf.d/00proxy
        content: |
          Acquire::http::Proxy
            "http://{{ _apt_cache_ip }}:{{ _apt_cache_port }}";
        owner: root
        group: root
        mode: '0644'

    - name: Remove stale apt proxy configuration
      when: "'apt-cacher-ng' not in hostvars"
      ansible.builtin.file:
        path: /etc/apt/apt.conf.d/00proxy
        state: absent

# =============================================================================
# Phase 0b: MinIO Object Storage
# S3-compatible artifact store for Splunk add-ons and other deployment assets
# =============================================================================

- name: Deploy MinIO object storage
  hosts: minio_group
  become: true
  gather_facts: false
  tags:
    - minio
    - storage
  roles:
    - role: minio

# =============================================================================
# Phase 1a: DNS Installation
# Install Technitium DNS server and bootstrap credentials from SOPS
# (or OpenBao once `openbao_available: true`).
# Must run BEFORE record management (Phase 1b).
# =============================================================================

- name: Install and bootstrap Technitium DNS server
  hosts: technitium_dns_group
  become: true
  gather_facts: false
  tags:
    - technitium_install
    - technitium_dns
    - dns

  vars:
    technitium_dns_host: "{{ container_ip | default(ansible_host) }}"

  roles:
    - role: technitium_install

# =============================================================================
# Phase 1b: DNS Configuration
# Technitium DNS must be configured first to enable hostname-based references
# =============================================================================

- name: Configure Technitium DNS with internal A records
  hosts: localhost
  become: false
  gather_facts: false
  tags:
    - technitium_dns
    - dns

  vars:
    # Derive Technitium DNS host IP from gateway (VMID 103)
    technitium_dns_host: "{{ lookup('env', 'PROXMOX_VE_GATEWAY') | regex_replace('\\.[0-9]+$', '.103') }}"
    # group_vars/all.yml sets `ansible_become: true` (an inventory variable),
    # which Ansible applies via the connection layer and which overrides the
    # play-level `become: false` keyword. The reliable way to disable become
    # for this localhost-only play (which just hits HTTP APIs and never needs
    # sudo) is to override the inventory variable directly via play vars.
    ansible_become: false

  roles:
    - role: technitium_dns

# =============================================================================
# Phase 2: Cribl Edge (syslog processing)
# Native install in LXC containers - production pipeline
# =============================================================================

- name: Configure Cribl Edge on LXC containers
  hosts: cribl_edge
  become: true
  gather_facts: true
  serial: 1
  tags:
    - cribl_edge
    - cribl
    - pipeline

  roles:
    - role: cribl_edge

# =============================================================================
# Phase 2b: Cribl Stream (IPFIX/NetFlow processing)
# Native install in LXC containers - production pipeline
# =============================================================================

- name: Configure Cribl Stream on LXC containers
  hosts: cribl_stream_group
  become: true
  gather_facts: true
  serial: 1
  tags:
    - cribl_stream
    - cribl
    - pipeline

  roles:
    - role: cribl_stream

# =============================================================================
# Phase 2c: Cribl Packs
# Install .crbl pack assets onto Edge and Stream LXCs after the base
# Cribl install is up. Runs against the union of both groups; the role
# detects target via group_names and is a no-op for non-Cribl hosts.
# =============================================================================

- name: Install Cribl packs
  hosts: cribl_edge:cribl_stream_group
  become: true
  gather_facts: false
  tags:
    - cribl_packs
    - cribl
    - pipeline

  roles:
    - role: cribl_packs

# =============================================================================
# Phase 3: HAProxy Syslog/NetFlow VIP
# Forwards syslog to Cribl Edge LXCs, IPFIX to Cribl Stream LXCs
# =============================================================================

- name: Configure HAProxy syslog/netflow VIP
  hosts: haproxy_group
  become: true
  gather_facts: false
  serial: 1
  tags:
    - haproxy
    - loadbalancer

  roles:
    - role: haproxy

# =============================================================================
# Phase 4: Notification Services
# Mailpit SMTP relay and ntfy push notifications
# =============================================================================

- name: Configure Mailpit SMTP relay
  hosts: mailpit_group
  become: true
  gather_facts: false
  tags:
    - mailpit
    - notifications
    - smtp
  roles:
    - role: mailpit_docker

- name: Configure ntfy push notification server
  hosts: ntfy_group
  become: true
  gather_facts: false
  tags:
    - ntfy
    - notifications
    - push
  roles:
    - role: ntfy_docker

# =============================================================================
# Phase 5: Microsoft SQL Server
# Deploy SQL Server 2022 on Docker in LXC container
# =============================================================================

- name: Configure Microsoft SQL Server
  hosts: mssql_group
  become: true
  gather_facts: false
  tags:
    - mssql_docker
    - database
  roles:
    - role: mssql_docker

# =============================================================================
# Phase 6: Qdrant Vector Database
# AI RAG vector database -- Docker in LXC container
# =============================================================================

- name: Configure Qdrant vector database
  hosts: qdrant_group
  become: true
  gather_facts: false
  tags:
    - qdrant_docker
    - vectordb
    - ai
  vars:
    _vdb_ports: >-
      {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports'] }}
    qdrant_docker_http_port: "{{ _vdb_ports.qdrant_http }}"
    qdrant_docker_grpc_port: "{{ _vdb_ports.qdrant_grpc }}"
  roles:
    - role: qdrant_docker

# =============================================================================
# Phase 7: GitHub Actions Runners
# CI runners on docker-host VM — isolated from dev/test workloads
# =============================================================================

- name: Deploy GitHub Actions runners
  hosts: docker_vms
  become: true
  gather_facts: false
  tags:
    - github_runner
    - ci
  roles:
    - role: github_runner
      when: github_runner_admin_token is defined or github_runner_token is defined

# =============================================================================
# Phase 8: LlamaIndex RAG Engine
# CPU-only embeddings via Ollama + LlamaIndex orchestration
# =============================================================================

- name: Configure LlamaIndex RAG engine
  hosts: llamaindex_group
  become: true
  gather_facts: true
  tags:
    - llamaindex
    - rag
    - ai
  vars:
    _vdb_ports: >-
      {{ hostvars['localhost']['terraform_data']['constants']['vector_db_ports'] }}
    llamaindex_qdrant_host: "{{ hostvars['qdrant']['container_ip'] }}"
    llamaindex_qdrant_port: "{{ _vdb_ports.qdrant_http }}"
  roles:
    - role: llamaindex

# =============================================================================
# Phase 9: Systemd Restart Policies
# Apply restart-on-failure policies to all managed services
# Each group defines its services via group_vars
# =============================================================================

- name: Apply systemd restart policies to all managed services
  hosts: all
  become: true
  gather_facts: false
  tags:
    - restart-policy
    - hardening

  roles:
    - role: systemd_restart_policy
      when: systemd_restart_policy_services | default([]) | length > 0
