---
# Molecule converge playbook
# Tests the qdrant_docker role against the test container

- name: Converge
  hosts: all
  become: true
  gather_facts: true

  vars:
    # Override storage driver for Docker-in-Docker (vfs required, not fuse-overlayfs)
    qdrant_docker_storage_driver: vfs
    # Provide port variables normally injected from terraform_data.constants
    qdrant_docker_http_port: 6333
    qdrant_docker_grpc_port: 6334
    qdrant_docker_api_key: "{{ lookup('env', 'QDRANT_API_KEY') }}"

  tasks:
    - name: Include qdrant_docker role
      ansible.builtin.include_role:
        name: qdrant_docker
