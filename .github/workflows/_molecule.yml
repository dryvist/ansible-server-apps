---
name: Molecule

on:
  workflow_call:
    secrets:
      GH_ACTION_DOPPLER_IAC_CONF_MGMT:
        description: Doppler service token for iac-conf-mgmt/prd
        required: true

permissions:
  contents: read

jobs:
  test:
    name: Molecule (${{ matrix.scenario }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [default, qdrant, llamaindex]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Molecule and dependencies
        run: |
          uv pip install --system \
            molecule \
            'molecule-plugins[docker]>=23.0.0' \
            'ansible-core>=2.16' \
            'docker>=7.0.0' \
            ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Fetch secrets from Doppler
        uses: dopplerhq/secrets-fetch-action@451892f16195f9ac360e1a5bcbf0b5fd0e957534 # v2.0.0
        id: doppler
        with:
          doppler-token: ${{ secrets.GH_ACTION_DOPPLER_IAC_CONF_MGMT }}
          doppler-project: iac-conf-mgmt
          doppler-config: prd
          inject-env-vars: true

      - name: Run molecule tests
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
          MOLECULE_SCENARIO: ${{ matrix.scenario }}
        run: molecule test -s "$MOLECULE_SCENARIO"

  template-render:
    name: Template Rendering Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Install Ansible and dependencies
        run: |
          uv pip install --system \
            'ansible-core>=2.16'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Run template rendering tests
        run: ansible-playbook tests/template_render/verify_templates.yml -c local
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
