---
name: Issue Maintenance

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  issues: write
  pull-requests: read

jobs:
  sweep:
    uses: JacobPEvans/ai-workflows/.github/workflows/issue-sweeper.yml@v0.5.0
    secrets: inherit

  hygiene:
    uses: JacobPEvans/ai-workflows/.github/workflows/issue-hygiene.yml@v0.5.0
    secrets: inherit
